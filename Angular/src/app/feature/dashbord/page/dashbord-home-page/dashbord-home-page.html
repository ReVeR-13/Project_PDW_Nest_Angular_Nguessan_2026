<div class="dashbord-home">

    <section class="div-dashbord-home-header-title">
        <h2 class="dashbord-home-header-title">
            Bonjour, {{title}}
        </h2>
        <p class="dashbord-home-header-infos">
            {{mainInfo}}
        </p>
    </section>

    <section class="section-corp">

        <div class="div-infos-urgence-message">

            <div class="infos infos-urgent">
                <div class="div-urgence-unit">

                    <div class="div-title-urgence">
                        <div class="div-info-title">
                            <i class="icon i-urgence">&#128680;</i>
                            <h3 class="title3 title-urgence">Urgences</h3>
                        </div>
                        <button class="btn1 add-urgence">
                            <span class="add-urgence-plus">+</span>Ajouter
                        </button>
                    </div>

                    <div class="div-corps-urgence">
                        <div class="urgence-unit urgence-unit-1">
                            [ Infos Urgences ]
                            <button class="btn urgence-unit-btn urgence-unit-btn-1" type="button">+</button>
                        </div>
                        <div class="urgence-unit urgence-unit-2">
                            [ Infos Urgences ]
                        </div>
                        <div class="urgence-unit urgence-unit-3">
                            [ Infos Urgences ]
                        </div>
                    </div>

                </div>
            </div>

            <div class="infos infos-message">

                <div class="message-header">

                    <div class="message-title">
                        <i class="icon i-message">&#128172;</i>
                        <h3 class="title3 title-message">Messages</h3>
                    </div>

                    <div class="div-message-sender">

                        <p class="message-sender">
                            [ Sender ]
                        </p>

                        <div class="div-bull-message">
                            <span class="bull-message bull-message-1"></span>
                            <span class="bull-message bull-message-2 selected"></span>
                            <span class="bull-message bull-message-3"></span>
                        </div>

                    </div>

                </div>

                <div class="message-corp">
                    [ Messages ]
                </div>

            </div>

        </div>

        <div class="infos infos-dossiers">
            <div class="div-dossier-title">
                <i class="icon i-dossier">&#128194;</i>
                <h3 class="title3 title-dossier">Demandes</h3>
            </div>

            <div class="div-dossier-corps">
                [ Infos Demandes ]
            </div>

            <button class="btn1 btn-new-demande" type="button">Nouveau</button>
        </div>

    </section>
</div>
